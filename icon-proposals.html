<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width"/>
<style>
  body { background: #001e2b; font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 48px; padding: 48px 24px; margin: 0; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { color: #a8b3bc; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
  .header-preview { background: #001e2b; border: 1px solid #1c2d38; border-radius: 16px; padding: 24px 32px; display: flex; align-items: center; gap: 12px; }
  .app-name { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.3px; }
  .app-name span { color: #00ed64; }
</style>
</head>
<body>

<!-- A: Stilisiertes Rad -->
<div class="option">
  <div class="label">A — Rad</div>
  <div class="header-preview">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="14" stroke="white" stroke-width="2"/>
      <circle cx="20" cy="20" r="3.5" fill="#00ed64"/>
      <line x1="20" y1="6" x2="20" y2="16.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="34" y1="20" x2="23.5" y2="20" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="27.9" y1="12.1" x2="22.5" y2="17.5" stroke="#00ed64" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="12.1" y1="27.9" x2="17.5" y2="22.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="12.1" y1="12.1" x2="17.5" y2="17.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="27.9" y1="27.9" x2="22.5" y2="22.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="app-name">TrailBlazer <span>Ultra</span></div>
  </div>
</div>

<!-- B: Berg + Route -->
<div class="option">
  <div class="label">B — Gipfel</div>
  <div class="header-preview">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <path d="M6 30 L16 14 L20 20 L26 10 L34 30Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
      <path d="M6 30 Q14 22 20 26 Q26 30 34 30" stroke="#00ed64" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle cx="26" cy="10" r="2.5" fill="#00ed64"/>
    </svg>
    <div class="app-name">TrailBlazer <span>Ultra</span></div>
  </div>
</div>

<!-- C: Kompass -->
<div class="option">
  <div class="label">C — Kompass</div>
  <div class="header-preview">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="14" stroke="white" stroke-width="1.8"/>
      <polygon points="20,8 23,20 20,17 17,20" fill="#00ed64"/>
      <polygon points="20,32 23,20 20,23 17,20" fill="white" opacity="0.5"/>
      <circle cx="20" cy="20" r="2" fill="white"/>
      <text x="20" y="7" text-anchor="middle" font-size="5" fill="#00ed64" font-family="system-ui" font-weight="700">N</text>
    </svg>
    <div class="app-name">TrailBlazer <span>Ultra</span></div>
  </div>
</div>

<!-- D: Blitz / Speed -->
<div class="option">
  <div class="label">D — Blitz</div>
  <div class="header-preview">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="4" width="32" height="32" rx="10" fill="#00ed64" fill-opacity="0.12" stroke="#00ed64" stroke-width="1.5"/>
      <path d="M22 8 L14 21 H20 L18 32 L26 19 H20 L22 8Z" fill="white"/>
      <path d="M22 8 L14 21 H20 L18 32 L26 19 H20 L22 8Z" fill="#00ed64" fill-opacity="0.3"/>
    </svg>
    <div class="app-name">TrailBlazer <span>Ultra</span></div>
  </div>
</div>

</body>
</html>
