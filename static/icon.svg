<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Radial depth gradient — survives glass overlay -->
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#013a2a"/>
      <stop offset="100%" stop-color="#001018"/>
    </radialGradient>
    <!-- Highlight simulating glass catch-light -->
    <radialGradient id="glow" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#00ed64" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ed64" stop-opacity="0"/>
    </radialGradient>
    <!-- Bolt inner glow -->
    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with depth -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Green ambient glow top-left -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Bolt bloom (soft green halo) -->
  <path d="M280 88 L168 272 H240 L216 424 L344 240 H272 L280 88Z"
    fill="#00ed64" fill-opacity="0.25" filter="url(#bloom)"/>

  <!-- Bolt solid -->
  <path d="M280 88 L168 272 H240 L216 424 L344 240 H272 L280 88Z"
    fill="#00ed64"/>

  <!-- Subtle top-edge highlight (glass catch) -->
  <rect width="512" height="2" fill="white" fill-opacity="0.08"/>
</svg>
